apiVersion: apps/v1
kind: Deployment
metadata:
  name: transparency-service
  labels:
    app: transparency-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transparency-service
  template:
    metadata:
      labels:
        app: transparency-service
    spec:
      containers:
      - name: transparency-service
        image: conexao-solidaria/transparency-service:latest
        ports:
        - containerPort: 80
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            configMapKeyRef:
              name: connection-strings
              key: campaign-connection
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: transparency-service
spec:
  selector:
    app: transparency-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
