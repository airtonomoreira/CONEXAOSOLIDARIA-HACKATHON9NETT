name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore ConexaoSolidaria.sln

    - name: Build solution
      run: dotnet build ConexaoSolidaria.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test ConexaoSolidaria.sln --configuration Release --no-build --verbosity normal

    - name: Build Docker images
      run: |
        docker build -f docker/AuthService.Dockerfile -t conexao-solidaria/auth-service:${{ github.sha }} .
        docker build -f docker/CampaignService.Dockerfile -t conexao-solidaria/campaign-service:${{ github.sha }} .
        docker build -f docker/DonationService.Dockerfile -t conexao-solidaria/donation-service:${{ github.sha }} .
        docker build -f docker/DonationWorker.Dockerfile -t conexao-solidaria/donation-worker:${{ github.sha }} .
        docker build -f docker/TransparencyService.Dockerfile -t conexao-solidaria/transparency-service:${{ github.sha }} .

    - name: Login to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker images
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag conexao-solidaria/auth-service:${{ github.sha }} conexao-solidaria/auth-service:latest
        docker tag conexao-solidaria/campaign-service:${{ github.sha }} conexao-solidaria/campaign-service:latest
        docker tag conexao-solidaria/donation-service:${{ github.sha }} conexao-solidaria/donation-service:latest
        docker tag conexao-solidaria/donation-worker:${{ github.sha }} conexao-solidaria/donation-worker:latest
        docker tag conexao-solidaria/transparency-service:${{ github.sha }} conexao-solidaria/transparency-service:latest
        
        docker push conexao-solidaria/auth-service:${{ github.sha }}
        docker push conexao-solidaria/auth-service:latest
        docker push conexao-solidaria/campaign-service:${{ github.sha }}
        docker push conexao-solidaria/campaign-service:latest
        docker push conexao-solidaria/donation-service:${{ github.sha }}
        docker push conexao-solidaria/donation-service:latest
        docker push conexao-solidaria/donation-worker:${{ github.sha }}
        docker push conexao-solidaria/donation-worker:latest
        docker push conexao-solidaria/transparency-service:${{ github.sha }}
        docker push conexao-solidaria/transparency-service:latest
